<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

  <div class="mb-3">
    <label class="form-label fw-bold">Ingrese RUN del paciente (Sin DV ni guión):</label>
    <div class="input-group">
      <input type="text" id="txtRun" class="form-control" placeholder="Ej: 12345678" 
             onkeypress="if(event.keyCode==13) buscar()" 
             oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="8">
      <button class="btn btn-primary" onclick="buscar()" id="btnBuscar">Buscar</button>
    </div>
  </div>

  <div id="resultado" class="mt-4" style="display:none;"></div>

  <script>
    function buscar() {
      const run = document.getElementById('txtRun').value.trim();
      if(!run) return;

      const btn = document.getElementById('btnBuscar');
      btn.disabled = true;
      btn.innerText = "Buscando...";

      const div = document.getElementById('resultado');
      div.style.display = 'block';
      div.innerHTML = '<div class="text-center text-muted">Consultando base de datos...</div>';

      google.script.run.withSuccessHandler(res => {
        btn.disabled = false;
        btn.innerText = "Buscar";
        const runBuscado = document.getElementById('txtRun').value;

        if(res.encontrado) {
          div.innerHTML = `
            <div class="alert alert-success p-3 border border-success">
              <h6 class="fw-bold mb-1">${res.nombre}</h6>
              <p class="mb-3 small text-dark">RUN: ${res.runCompleto} | Convenio: ${res.convenio}</p>
              <div class="d-grid gap-2">
                <button class="btn btn-primary btn-sm fw-bold" onclick="abrirModulo(this, 'mostrarModalAtencion', '${runBuscado}')">📝 Registrar Atención</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="abrirModulo(this, 'mostrarSidebarEditarPaciente', '${runBuscado}')">✏️ Editar Paciente</button>
              </div>
            </div>`;
        } else {
          div.innerHTML = `
            <div class="alert alert-warning p-3 border border-warning">
              <h6 class="fw-bold text-danger">Paciente no encontrado</h6>
              <p class="small mb-3">El RUN ingresado no está registrado en el sistema.</p>
              <button class="btn btn-success w-100 fw-bold" onclick="abrirModulo(this, 'mostrarSidebarPacientes')">👤 Registrar Nuevo Paciente</button>
            </div>`;
        }
      }).buscarPacienteBackend(run);
    }

    // Nueva función segura
    function abrirModulo(botonPresionado, funcionScript, runParametro) {
      // 1. Cambiamos visualmente el botón a cargando
      botonPresionado.innerText = "⏳ Abriendo...";
      botonPresionado.disabled = true;

      // 2. Preparamos el cierre de la ventana SOLO cuando el servidor responda
      const ejecucionSegura = google.script.run.withSuccessHandler(function() {
        google.script.host.close();
      });

      // 3. Ejecutamos la función en el servidor
      if (runParametro) {
        ejecucionSegura[funcionScript](runParametro);
      } else {
        ejecucionSegura[funcionScript]();
      }
    }
  </script>
</body>
</html>
